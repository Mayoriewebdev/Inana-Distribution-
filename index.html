        <section class="distributor-section">
            <div class="form-container" data-aos="zoom-in" data-aos-duration="1000">

                <!-- TITLE IMAGE -->
                <div class="form-title" data-aos="fade-down" data-aos-delay="200">
                    <img src="images/apply.png" alt="Apply for Distributorship">
                </div>

                <form action="#" method="POST">

                    <div class="input-group full" data-aos="fade-up" data-aos-delay="300">
                        <input type="text" placeholder="Business Name" required>
                    </div>

                    <div class="input-group full" data-aos="fade-up" data-aos-delay="400">
                        <input type="text" placeholder="Location" required>
                    </div>

                    <div class="row">
                        <div class="input-group" data-aos="fade-right" data-aos-delay="500">
                            <input type="text" placeholder="Years in Business">
                        </div>
                        <div class="input-group" data-aos="fade-left" data-aos-delay="500">
                            <input type="text" placeholder="Qty. to Order">
                        </div>
                    </div>

                    <div class="input-group full" data-aos="fade-up" data-aos-delay="600">
                        <input type="text" placeholder="Contact Person">
                    </div>

                    <div class="row">
                        <div class="input-group" data-aos="fade-right" data-aos-delay="700">
                            <input type="tel" placeholder="Phone Number">
                        </div>
                        <div class="input-group" data-aos="fade-left" data-aos-delay="700">
                            <input type="email" placeholder="Email">
                        </div>
                    </div>

                    <!-- IMAGE BUTTON -->
                    <button type="submit" class="submit-btn" data-aos="zoom-in-up" data-aos-delay="800">
                        <img src="images/Submit.png" alt="Submit Application">
                    </button>

                </form>

                <!-- CHAT ICON -->
                <a href="https://wa.me/+2348137785600?text=Hello%20I%20want%20to%20apply%20for%20distributorship"
                    class="chat-bubble" target="_blank" data-aos="fade-up" data-aos-delay="1000">
                    <img src="images/Chat icon.png" alt="Customer Care">
                </a>

            </div>
        </section>
